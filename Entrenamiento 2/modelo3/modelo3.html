<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo 3</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="contenido">
        <div class="sector superior">
            <div class="cuadrado izquierdo verde primario">
                <span>1</span>
            </div>
            <div class="cuadrado derecho verde secundario">
                <span>2</span>
            </div>
        </div>

        <div class="sector intermedio">
            <div class="cuadrado izquierdo amarillo primario">
                <span>3</span>
            </div>
            <div class="cuadrado derecho amarillo secundario">
                <span>4</span>
            </div>
        </div>

        <div class="sector inferior">
            <div class="cuadrado izquierdo rojo secundario">
                <span>5</span>
            </div>
            <div class="cuadrado derecho azul primario">
                <span>6</span>
            </div>
        </div>

    </main>
</body>

</html>
